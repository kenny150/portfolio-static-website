---
- name: Instalar e iniciar Nginx na EC2 AWS
  hosts: aws_ec2
  become: yes
  vars:
    ansible_user: ec2-user
  tasks:
    - name: Atualizar pacotes
      yum:
        name: '*'
        state: latest
      when: ansible_os_family == 'RedHat'

    - name: Instalar Nginx
      yum:
        name: nginx
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Abrir porta 80 no firewall (caso firewalld esteja ativo)
      firewalld:
        port: 80/tcp
        permanent: yes
        state: enabled
        immediate: yes
      when: ansible_os_family == 'RedHat'
        and ansible_facts.services['firewalld.service'] is defined
        and ansible_facts.services['firewalld.service'].state == 'running'

    - name: Criando página inicial personalizada
      copy:
        src: ../pages/index.html
        dest: /usr/share/nginx/html/index.html
        owner: root
        group: root
        mode: '0644'

    - name: Garantir que o diretório styles existe
      file:
        path: /usr/share/nginx/html/styles
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Criando diretório para certificados SSL
      file:
        path: /etc/nginx/ssl
        state: directory
        owner: root
        group: root
        mode: '0755'
      become: true

    - name: Configurando bloco ssl para redirecionar http para https
      copy:
        src: ../certs/nginx_ssl.conf
        dest: /etc/nginx/conf.d/ssl.conf
        owner: root
        group: root
        mode: '0644'
      become: true 
      # notify:
      #   - Reiniciar Nginx   

    - name: Copiando certificados SSL para o servidor
      copy:
        src: ../certs/nginx-selfsigned.crt
        dest: /etc/nginx/ssl/nginx.crt
        owner: root
        group: root
        mode: '0644'
      become: true
      # notify:
      #   - Reiniciar Nginx

    - name: Copiando chave privada SSL para o servidor
      copy:
        src: ../certs/nginx-selfsigned.key
        dest: /etc/nginx/ssl/nginx.key
        owner: root
        group: root
        mode: '0600'
      become: true
      # notify:
      #   - Reiniciar Nginx

    - name: Verificar configuração do Nginx
      become: true
      command: nginx -t

    - name: Start and enable Nginx
      become: true
      block:
        - name: Iniciar e habilitar Nginx
          systemd:
            name: nginx
            state: started
            enabled: yes
          when: ansible_os_family == 'RedHat'
      rescue:
        - name: Coletar logs do Nginx após falha
          command: journalctl -xeu nginx.service --no-pager -n 50
          register: nginx_journal
          failed_when: false
          changed_when: false

        - name: Exibir logs do Nginx
          debug:
            var: nginx_journal.stdout_lines

        - name: Falhar com diagnóstico do Nginx
          fail:
            msg: "Nginx service failed to start. Veja os logs acima para detalhes."

    - name: Criando diretório js
      file:
        path: /usr/share/nginx/html/js
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Criando o diretório assets
      file:
        path: /usr/share/nginx/html/assets
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copiando tudo que tem em assets para o servidor
      ansible.builtin.copy:
        src: ../pages/assets
        dest: /usr/share/nginx/html/
        owner: root
        group: root
        mode: '0755'
      become: true

    - name: Copiando arquivo js para o servidor
      copy:
        src: ../pages/js/scripts.js
        dest: /usr/share/nginx/html/js/scripts.js
        owner: root
        group: root
        mode: '0755'

    - name: Aplicando estilos personalizados
      copy:
        src: ../pages/styles/styles.css
        dest: /usr/share/nginx/html/styles/styles.css
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reiniciar Nginx

  handlers:
    - name: Reiniciar Nginx
      become: true
      block:
        - name: Verificar configuração do Nginx
          command: nginx -t

        - name: Reiniciar Nginx
          systemd:
            name: nginx
            state: restarted
      when: ansible_os_family == 'RedHat'
