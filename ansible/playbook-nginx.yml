---
- name: Instalar e iniciar Nginx na EC2 AWS
  hosts: aws_ec2
  become: yes
  vars:
    ansible_user: ec2-user
  tasks:
    - name: Atualizar pacotes
      yum:
        name: '*'
        state: latest
      when: ansible_os_family == 'RedHat'

    - name: Instalar Nginx
      yum:
        name: nginx
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Abrir porta 80 no firewall (caso firewalld esteja ativo)
      firewalld:
        port: 80/tcp
        permanent: yes
        state: enabled
        immediate: yes
      when: ansible_os_family == 'RedHat'
        and ansible_facts.services['firewalld.service'] is defined
        and ansible_facts.services['firewalld.service'].state == 'running'

    - name: Criando diretório para certificados SSL
      file:
        path: /etc/nginx/ssl
        state: directory
        owner: root
        group: root
        mode: '0755'
      become: true

    - name: Configurando bloco ssl para redirecionar http para https
      copy:
        src: ../certs/nginx_ssl.conf
        dest: /etc/nginx/conf.d/ssl.conf
        owner: root
        group: root
        mode: '0644'
      become: true 
      # notify:
      #   - Reiniciar Nginx   

    - name: Copiando certificados SSL para o servidor
      copy:
        src: ../certs/nginx-selfsigned.crt
        dest: /etc/nginx/ssl/nginx.crt
        owner: root
        group: root
        mode: '0644'
      become: true
      # notify:
      #   - Reiniciar Nginx

    - name: Copiando chave privada SSL para o servidor
      copy:
        src: ../certs/nginx-selfsigned.key
        dest: /etc/nginx/ssl/nginx.key
        owner: root
        group: root
        mode: '0600'
      become: true
      # notify:
      #   - Reiniciar Nginx

    - name: Verificar configuração do Nginx
      become: true
      command: nginx -t

    - name: Start and enable Nginx
      become: true
      block:
        - name: Iniciar e habilitar Nginx
          systemd:
            name: nginx
            state: started
            enabled: yes
          when: ansible_os_family == 'RedHat'
      rescue:
        - name: Coletar logs do Nginx após falha
          command: journalctl -xeu nginx.service --no-pager -n 50
          register: nginx_journal
          failed_when: false
          changed_when: false

        - name: Exibir logs do Nginx
          debug:
            var: nginx_journal.stdout_lines

        - name: Falhar com diagnóstico do Nginx
          fail:
            msg: "Nginx service failed to start. Veja os logs acima para detalhes."

    - name: Garantir diretório raiz do site
      file:
        path: /usr/share/nginx/html
        state: directory
        owner: root
        group: root
        mode: '0755'
      become: true

    - name: Copiando arquivos principais da pasta pages
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/usr/share/nginx/html/{{ item | basename }}"
        owner: root
        group: root
        mode: '0644'
      loop:
        - ../pages/index.html
        - ../pages/about.html
        - ../pages/contact.html
        - ../pages/portfolio-details.html
        - ../pages/portfolio.html
        - ../pages/service-details.html
        - ../pages/services.html
        - ../pages/starter-page.html
        - ../pages/forms/contact.php
      become: true
      notify:
        - Reiniciar Nginx

    - name: Copiando pasta assets para o servidor
      ansible.builtin.copy:
        src: ../pages/assets/
        dest: /usr/share/nginx/html/assets/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
      become: true
      notify:
        - Reiniciar Nginx

    - name: Copiando pasta css dentro de assets para o servidor
      ansible.builtin.copy:
        src: ../pages/assets/css/
        dest: /usr/share/nginx/html/assets/css/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
      become: true
      notify:
        - Reiniciar Nginx

    - name: Copiando pasta img dentro de assets para o servidor
      ansible.builtin.copy:
        src: ../pages/assets/img/
        dest: /usr/share/nginx/html/assets/img/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
      become: true
      notify:
        - Reiniciar Nginx

    - name: Copiando pasta js dentro de assets para o servidor
      ansible.builtin.copy:
        src: ../pages/assets/js/
        dest: /usr/share/nginx/html/assets/js/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
      become: true
      notify:
        - Reiniciar Nginx

    - name: Copiando pasta scss dentro de assets para o servidor
      ansible.builtin.copy:
        src: ../pages/assets/scss/
        dest: /usr/share/nginx/html/assets/scss/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
      become: true
      notify:
        - Reiniciar Nginx

    - name: Copiando pasta vendor dentro de assets para o servidor
      ansible.builtin.copy:
        src: ../pages/assets/vendor/
        dest: /usr/share/nginx/html/assets/vendor/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
      become: true
      notify:
        - Reiniciar Nginx

    - name: Copiando pasta forms para o servidor
      ansible.builtin.copy:
        src: ../pages/forms/
        dest: /usr/share/nginx/html/forms/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
      become: true
      notify:
        - Reiniciar Nginx

    - name: Copiando pasta js para o servidor
      ansible.builtin.copy:
        src: ../pages/js/
        dest: /usr/share/nginx/html/js/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
      become: true
      notify:
        - Reiniciar Nginx

    - name: Copiando pasta styles para o servidor
      ansible.builtin.copy:
        src: ../pages/styles/
        dest: /usr/share/nginx/html/styles/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'
      become: true
      notify:
        - Reiniciar Nginx

  handlers:
    - name: Reiniciar Nginx
      become: true
      block:
        - name: Verificar configuração do Nginx
          command: nginx -t

        - name: Reiniciar Nginx
          systemd:
            name: nginx
            state: restarted
      when: ansible_os_family == 'RedHat'
