<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Métricas de Deploy</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .chart-container { width: 80vw; max-width: 800px; margin: 2rem auto; }
  </style>
</head>
<body>
  <h1>Métricas de Deploy</h1>
  <div class="chart-container">
    <canvas id="deployChart"></canvas>
  </div>
  <script>
    async function fetchDeploys() {
      const res = await fetch('deploys.json');
      return res.json();
    }
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleString('pt-BR');
    }
    async function renderChart() {
      const data = await fetchDeploys();
      const labels = data.map(d => formatDate(d.timestamp));
      const statusData = data.map(d => d.status === 'success' ? 1 : 0);
      const durationData = data.map(d => d.duration);
      const ctx = document.getElementById('deployChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Deploy bem-sucedido (1=sim, 0=não)',
              data: statusData,
              backgroundColor: statusData.map(s => s ? 'green' : 'red'),
              yAxisID: 'y',
            },
            {
              label: 'Duração (s)',
              data: durationData,
              type: 'line',
              borderColor: 'blue',
              backgroundColor: 'rgba(0,0,255,0.1)',
              yAxisID: 'y1',
            }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          stacked: false,
          plugins: {
            title: { display: true, text: 'Histórico de Deploys' }
          },
          scales: {
            y: {
              type: 'linear',
              display: true,
              position: 'left',
              min: 0,
              max: 1,
              title: { display: true, text: 'Status' }
            },
            y1: {
              type: 'linear',
              display: true,
              position: 'right',
              title: { display: true, text: 'Duração (s)' },
              grid: { drawOnChartArea: false }
            }
          }
        }
      });
    }
    renderChart();
  </script>
</body>
</html>
